#cloud-config
package_update: true
package_upgrade: false

packages:
  - git
  - curl
  - wget
  - unzip
  - build-essential
  - python3-venv
  - python3-pip
  - python3-dev
  - htop
  - tmux
  - nvtop
  - jq
  - ca-certificates

write_files:
  - path: /opt/rft/bootstrap_rft_environment.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      REPO_URL="${repo_url}"
      REPO_DIR="${repo_dir}"
      RUNS_DIR="/mnt/rft-data/runs"
      ARTIFACTS_DIR="/mnt/rft-data/artifacts"
      VENV_DIR="/opt/rft/.venv"

      echo "[RFT] Creating directories"
      mkdir -p /opt/rft
      mkdir -p "$RUNS_DIR" "$ARTIFACTS_DIR"
      chown -R ${admin_username}:${admin_username} /opt/rft /mnt/rft-data || true

      echo "[RFT] Installing Python virtual environment"
      python3 -m venv "$VENV_DIR"
      source "$VENV_DIR/bin/activate"
      python -m pip install --upgrade pip wheel setuptools

      echo "[RFT] Installing scientific Python packages"
      # CUDA-enabled torch wheels are installed from PyTorch's CUDA index.
      # Adjust cu121/cu124 if needed for the driver image used on the VM.
      pip install --index-url https://download.pytorch.org/whl/cu121 torch torchvision torchaudio
      pip install numpy scipy pandas matplotlib tqdm pyyaml rich

      echo "[RFT] Cloning repository"
      if [ ! -d "$REPO_DIR/.git" ]; then
        git clone "$REPO_URL" "$REPO_DIR"
      else
        cd "$REPO_DIR"
        git pull --ff-only || true
      fi
      chown -R ${admin_username}:${admin_username} "$REPO_DIR"

      echo "[RFT] Writing environment helper"
      cat >/opt/rft/activate.sh <<'EOS'
      #!/usr/bin/env bash
      source /opt/rft/.venv/bin/activate
      export RFT_REPO=/opt/rft/-resonance-field-theory
      export RFT_RUNS=/mnt/rft-data/runs
      export RFT_ARTIFACTS=/mnt/rft-data/artifacts
      cd "$RFT_REPO"
      EOS
      chmod +x /opt/rft/activate.sh
      chown ${admin_username}:${admin_username} /opt/rft/activate.sh

      echo "[RFT] Creating GPU test script"
      cat >/opt/rft/gpu_smoke_test.py <<'EOS'
      import torch
      print('torch:', torch.__version__)
      print('cuda available:', torch.cuda.is_available())
      if torch.cuda.is_available():
          print('device count:', torch.cuda.device_count())
          for i in range(torch.cuda.device_count()):
              print(i, torch.cuda.get_device_name(i))
          x = torch.randn((4096, 4096), device='cuda')
          y = x @ x.T
          print('smoke result:', float(y[0,0].detach().cpu()))
      EOS
      chown ${admin_username}:${admin_username} /opt/rft/gpu_smoke_test.py

      echo "[RFT] Bootstrap complete"

  - path: /opt/rft/README_NEXT_STEPS.txt
    permissions: '0644'
    content: |
      RFT Azure GPU VM setup
      ======================

      After SSH login:

        source /opt/rft/activate.sh
        python /opt/rft/gpu_smoke_test.py
        nvidia-smi

      Repository:

        /opt/rft/-resonance-field-theory

      Data / run outputs:

        /mnt/rft-data/runs
        /mnt/rft-data/artifacts

      Recommended workflow:

        tmux new -s rft
        source /opt/rft/activate.sh
        git pull
        python <experiment-runner>.py

runcmd:
  - [ bash, -lc, "mkdir -p /mnt/rft-data" ]
  - [ bash, -lc, "DISK=/dev/disk/azure/scsi1/lun${data_disk_lun}; for i in {1..60}; do if [ -b $DISK ]; then break; fi; sleep 2; done; if [ -b $DISK ]; then mkfs.ext4 -F $DISK; echo '$DISK /mnt/rft-data ext4 defaults,nofail 0 2' >> /etc/fstab; mount -a; fi" ]
  - [ bash, -lc, "chown -R ${admin_username}:${admin_username} /mnt/rft-data /opt/rft || true" ]
  - [ bash, -lc, "/opt/rft/bootstrap_rft_environment.sh > /var/log/rft-bootstrap.log 2>&1" ]

final_message: "RFT Azure GPU VM bootstrap completed. Check /var/log/rft-bootstrap.log."
